<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balance — Painel Digital</title>
    <meta name="description" content="Painel digital Balance — Mapa de Aulas e Galeria de Momentos">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- ══════════════════════════════════════
         HEADER (sempre visível)
    ══════════════════════════════════════ -->
    <header>
        <img src="assets/newlogobc_white.png" class="logo-img" alt="Balance">
        <div class="greeting" id="greeting"></div>
        <div class="header-right">
            <div class="weather" id="weather">--°C</div>
            <span class="header-divider"></span>
            <div class="clock" id="clock">00:00:00</div>
        </div>
    </header>

    <!-- ══════════════════════════════════════
         MODO A — MAPAS DE AULAS
    ══════════════════════════════════════ -->
    <main class="dashboard-grid" id="dashboard-grid">
        <div class="map-card">
            <iframe id="iframe-piscina" src=""></iframe>
        </div>
        <div class="map-card">
            <iframe id="iframe-ginasio" src=""></iframe>
        </div>
    </main>

    <!-- ══════════════════════════════════════
         MODO B — CARROSSEL DE FOTOS (overlay)
    ══════════════════════════════════════ -->
    <div class="carousel-overlay" id="carousel-overlay">

        <!-- Cabeçalho da categoria atual -->
        <div class="category-header">
            <span class="category-icon" id="category-icon">📸</span>
            <span class="category-name" id="category-name">Balance</span>
            <div class="category-dots" id="category-dots"></div>
        </div>

        <!-- Área de exibição da foto -->
        <div class="carousel-photos" id="carousel-photo-area"></div>

        <!-- Barra de progresso da foto atual -->
        <div class="photo-progress">
            <div class="photo-progress-bar" id="photo-progress-bar"></div>
        </div>

        <!-- Ecrã de transição entre categorias -->
        <div class="category-transition" id="category-transition">
            <div class="transition-icon" id="transition-icon">📸</div>
            <div class="transition-label" id="transition-label">Balance</div>
        </div>

    </div>

    <!-- ══════════════════════════════════════
         BARRA DE PROGRESSO DO CICLO (fundo)
    ══════════════════════════════════════ -->
    <div class="cycle-indicator">
        <div class="cycle-bar" id="cycle-bar"></div>
    </div>

    <!-- Status dot -->
    <div class="status-dot" id="status-dot"></div>

    <script src="js/panel.js"></script>
</body>

</html>
