<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balance - Mapa de Aulas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #000000;
            --bg: #000000;
            --header-bg: #000000;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            color: white;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        header {
            height: 70px;
            background: var(--header-bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            border-bottom: 3px solid var(--primary);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        .logo-img {
            height: 140px;
            width: auto;
            object-fit: contain;
            color: #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            padding: 0 10px;
            border-radius: 4px;
        }

        .greeting {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 46px;
            font-weight: 600;
            font-family: 'Iosevka Charon Mono', 'Inter', sans-serif;
            color: white;
            letter-spacing: 2px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .weather {
            font-size: 40px;
            font-weight: 500;
            color: white;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .clock {
            font-size: 44px;
            font-weight: 300;
            font-family: 'Inter', sans-serif;
            font-variant-numeric: tabular-nums;
        }

        .header-divider {
            width: 2px;
            height: 36px;
            background: rgb(255, 255, 255);
        }

        .dashboard-grid {
            display: flex;
            gap: 15px;
            padding: 15px;
            height: calc(100vh - 73px);
            box-sizing: border-box;
            background: #000;
        }

        .map-card {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0a0a0a;
            border: 1px solid #1f1f1f;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        iframe {
            flex: 1;
            width: 100%;
            height: calc(100% + 40px);
            border: none;
            background: #000;
            transform: scale(1.02);
            transform-origin: top center;
        }
    </style>
</head>

<body>

    <header>
        <img src="newlogobc_white.png" class="logo-img">
        <div class="greeting" id="greeting"></div>
        <div class="header-right">
            <div class="weather" id="weather">--°C</div>
            <span class="header-divider"></span>
            <div class="clock" id="clock">00:00:00</div>
        </div>
    </header>

    <main class="dashboard-grid">
        <div class="map-card">
            <iframe id="iframe-piscina" src=""></iframe>
        </div>

        <div class="map-card">
            <iframe id="iframe-ginasio" src=""></iframe>
        </div>
    </main>

    <script>
        // CONFIGURAÇÃO: Cola aqui o URL que copiaste do Google Apps Script
        const API_URL = "https://script.google.com/macros/s/AKfycbxHOBfsmbBzBHQXi4yADl2kVtCqguWL8H4uzNdreBdYrbdbHJPWIgKUlBAGuGuExCrN/exec";

        async function updateContent() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                const timestamp = new Date().getTime();

                function toDrivePreview(url) {
                    // Se for /view, trocar para /preview
                    if (url.includes('/view')) {
                        url = url.replace('/view', '/preview');
                    }
                    const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
                    if (match && !url.includes('/preview')) {
                        url = 'https://drive.google.com/file/d/' + match[1] + '/preview';
                    }
                    // Adicionar rm=minimal para esconder a toolbar do Google Drive
                    if (url.includes('drive.google.com')) {
                        url += (url.includes('?') ? '&' : '?') + 'rm=minimal';
                    }
                    return url;
                }

                // Atualizar Piscina
                const iframePiscina = document.getElementById('iframe-piscina');
                if (data.piscina && data.piscina.includes('http')) {
                    const urlPiscina = toDrivePreview(data.piscina) + '?v=' + timestamp;
                    if (iframePiscina.src !== urlPiscina) {
                        iframePiscina.src = urlPiscina;
                        console.log('Mapa Piscina atualizado:', urlPiscina);
                    }
                }

                // Atualizar Ginásio
                const iframeGinasio = document.getElementById('iframe-ginasio');
                if (data.ginasio && data.ginasio.includes('http')) {
                    const urlGinasio = toDrivePreview(data.ginasio) + '?v=' + timestamp;
                    if (iframeGinasio.src !== urlGinasio) {
                        iframeGinasio.src = urlGinasio;
                        console.log('Mapa Ginásio atualizado:', urlGinasio);
                    }
                }
            } catch (err) {
                console.error('Erro ao procurar PDFs:', err);
            }
        }

        // Meteorologia
        async function updateWeather() {
            try {
                const response = await fetch("https://api.open-meteo.com/v1/forecast?latitude=40.6133&longitude=-8.6472&current_weather=true");
                const data = await response.json();
                const temp = Math.round(data.current_weather.temperature);
                const code = data.current_weather.weathercode;

                let icon = "🌡️";
                if (code === 0) icon = "☀️";
                else if (code >= 1 && code <= 3) icon = "⛅";
                else if (code >= 45 && code <= 48) icon = "🌫️";
                else if (code >= 51 && code <= 67) icon = "🌧️";
                else if (code >= 71 && code <= 77) icon = "❄️";
                else if (code >= 95 && code <= 99) icon = "⛈️";

                document.getElementById('weather').innerText = `${icon} ${temp}°C`;
            } catch (err) {
                console.error("Erro ao procurar o tempo:", err);
            }
        }

        // Relógio digital e Saudação
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('pt-PT');

            const hour = now.getHours();
            let greeting = "Bom Dia"; // 05:00 às 11:59
            if (hour >= 12 && hour < 19) {
                greeting = "Boa Tarde"; // 12:00 às 18:59
            } else if (hour >= 19 || hour < 5) {
                greeting = "Boa Noite"; // 19:00 às 04:59
            }
            document.getElementById('greeting').innerText = greeting;
        }

        // Ciclos de atualização
        setInterval(updateClock, 1000); // Relógio a cada segundo
        setInterval(updateWeather, 1800000); // Tempo a cada 30 min
        setInterval(updateContent, 86400000); // Verifica novo PDF a cada 1 dia

        // Carregar ao abrir
        updateContent();
        updateWeather();
        updateClock();
    </script>
</body>

</html>
